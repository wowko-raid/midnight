<!doctype html>
<html lang="cs">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boss taktika | Midnight Raid Taktiky CZ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    crossorigin="anonymous" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div id="main-nav-placeholder"></div>

  <main class="container py-5">
    <a href="index.html" class="btn btn-outline-info btn-sm mb-4">← Zpět na přehled raidů</a>
    <article id="boss-card" class="boss-card">
      <h1 id="boss-title">Načítání...</h1>
      <p id="boss-wowhead" class="small mb-2" style="display:none;"></p>
      <p id="boss-setup" class="role-plan"></p>
      <div id="boss-note" class="small" style="display:none;"></div>

      <div id="boss-overview" class="section-card" style="display:none;">
        <h2 class="section-title">Přehled</h2>
        <ul id="boss-overview-list"></ul>
      </div>

      <div id="difficulty-buttons" class="mb-4"></div>
      <div id="phases-container"></div>

      <p class="text-muted small mt-5" id="source-link"></p>
    </article>

    <div id="error" class="alert alert-danger" style="display:none;"></div>
  </main>

  <footer class="py-4 text-center text-light">
    <div class="container small">
      Přehled WoW raidů · zdroje: MythicTrap.com, Method.gg ·
      <a href="https://github.com/wowko-raid/midnight" target="_blank" rel="noopener" class="text-info">GitHub</a>
    </div>
  </footer>

  <script src="nav.js" type="module"></script>
  <script src="boss.js" type="module"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
</body>

</html>
